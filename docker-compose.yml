version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://host.docker.internal:27017/todo_app

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      # Maps local port 3001 to the container's port 80 (nginx)
      - "3001:80"
    depends_on:
      - server
